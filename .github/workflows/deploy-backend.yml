name: Deploy Backend to Azure App Service

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'shared/**'
      - 'package-lock.json'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: backend-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --workspace=backend

      - name: Typecheck
        run: npm run typecheck --workspace=backend

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Package & Deploy
        run: |
          # tsx로 TypeScript 소스 직접 실행 (컴파일 불필요, ESM/CJS 자동 처리)
          mkdir -p staging/backend staging/shared

          # TypeScript 소스 복사 (dist 아닌 src)
          cp -r backend/src staging/backend/src
          cp -r shared staging/shared

          # 배포용 package.json 생성 (type=module, tsx로 실행)
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('./backend/package.json', 'utf8'));
            const deploy = {
              name: p.name,
              version: p.version,
              type: 'module',
              scripts: { start: 'tsx backend/src/index.ts' },
              dependencies: p.dependencies
            };
            fs.writeFileSync('staging/package.json', JSON.stringify(deploy, null, 2));
          "

          cd staging
          npm install --omit=dev --no-audit --no-fund

          # 불필요한 플랫폼 바이너리 제거 (linux-x64는 유지!)
          rm -rf node_modules/@github/copilot/prebuilds
          rm -rf node_modules/@github/copilot/mxc-bin
          rm -rf node_modules/@github/copilot/tgrep
          rm -rf node_modules/@github/copilot/ripgrep
          rm -rf node_modules/@github/copilot/pvrecorder
          rm -rf node_modules/@github/copilot/clipboard
          rm -rf node_modules/@github/copilot-darwin-arm64
          rm -rf node_modules/@github/copilot-darwin-x64
          rm -rf node_modules/@github/copilot-win32-x64
          rm -rf node_modules/@github/copilot-win32-arm64
          rm -rf node_modules/@github/copilot-linuxmusl-x64
          rm -rf node_modules/@github/copilot-linuxmusl-arm64
          rm -rf node_modules/@github/copilot-linux-arm64
          rm -rf node_modules/typescript
          rm -rf node_modules/@esbuild

          echo "Size after cleanup:"
          du -sh node_modules

          zip -r ../backend-deploy.zip backend shared node_modules package.json
          echo "Zip size: $(du -sh ../backend-deploy.zip | cut -f1)"
          cd ..

          az webapp deploy \
            --name daycoach-api \
            --resource-group daycoach-rg \
            --src-path backend-deploy.zip \
            --type zip \
            --async true
          echo "✅ Deploy initiated"
