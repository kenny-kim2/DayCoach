name: Deploy Backend to Azure App Service

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'shared/**'
      - 'package-lock.json'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --workspace=backend

      - name: Build
        run: npm run build:backend

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        run: |
          mkdir -p deploy-staging
          cp -r backend/dist deploy-staging/dist
          # Create deployment package.json: no build script, correct start script
          node -e "
            const pkg = require('./backend/package.json');
            const deploy = {
              name: pkg.name,
              version: pkg.version,
              type: pkg.type,
              scripts: { start: 'node dist/backend/src/index.js', build: 'echo skip' },
              dependencies: pkg.dependencies
            };
            require('fs').writeFileSync('deploy-staging/package.json', JSON.stringify(deploy, null, 2));
          "
          cd deploy-staging
          zip -r ../backend-deploy.zip .
          cd ..
          az webapp deploy \
            --name daycoach-api \
            --resource-group daycoach-rg \
            --src-path backend-deploy.zip \
            --type zip \
            --async true
