name: Deploy Backend to Azure App Service

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'shared/**'
      - 'package-lock.json'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: backend-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install & Build
        run: |
          npm ci --workspace=backend
          npm run build:backend

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Package & Deploy
        run: |
          mkdir -p staging
          cp -r backend/dist staging/dist
          # type=commonjs 필수: 컴파일 결과가 CJS인데 원본은 "type":"module"
          node -e "
            const p = require('./backend/package.json');
            const deploy = { name: p.name, version: p.version, type: 'commonjs', scripts: { start: p.scripts.start }, dependencies: p.dependencies };
            require('fs').writeFileSync('staging/package.json', JSON.stringify(deploy, null, 2));
          "
          cd staging
          npm install --omit=dev --no-audit --no-fund

          # @github/copilot 안의 바이너리/IDE 전용 파일 제거 (서버 불필요)
          rm -rf node_modules/@github/copilot/prebuilds
          rm -rf node_modules/@github/copilot/mxc-bin
          rm -rf node_modules/@github/copilot/tgrep
          rm -rf node_modules/@github/copilot/ripgrep
          rm -rf node_modules/@github/copilot/pvrecorder
          rm -rf node_modules/@github/copilot/clipboard
          rm -rf node_modules/@github/copilot-darwin-arm64
          rm -rf node_modules/@github/copilot-linux-x64
          rm -rf node_modules/@esbuild
          rm -rf node_modules/typescript

          echo "Size after cleanup:"
          du -sh node_modules

          zip -r ../backend-deploy.zip dist node_modules package.json
          echo "Zip size: $(du -sh ../backend-deploy.zip | cut -f1)"
          cd ..

          az webapp deploy \
            --name daycoach-api \
            --resource-group daycoach-rg \
            --src-path backend-deploy.zip \
            --type zip \
            --async true
          echo "✅ Deploy initiated"
